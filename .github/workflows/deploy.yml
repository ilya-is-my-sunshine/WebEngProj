name: Pre-deployment Type Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # npm ci is faster and more reliable for CI environments
        run: npm ci

      - name: TypeScript Type Check
        # This ensures no type errors exist without generating output files
        run: npx tsc --noEmit