name: Build and Push to GHCR

on:
  push:
    branches: [ main ] # Change this if your main branch is named 'master'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This creates the image name: ghcr.io/your-username/your-repo:latest
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          # Essential for Render compatibility:
          platforms: linux/amd64 

      - name: Trigger Render Deploy
        # This tells Render to pull the new image immediately
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}